    function GridTraderApp() {
      const [userCode, setUserCode] = useState(null);
      const [assetManager, setAssetManagerState] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [newAssetForm, setNewAssetForm] = useState({ name: '', code: '', type: 'fund' });
      const [syncStatus, setSyncStatus] = useState('ok');

      const handleLogin = (code, manager) => { setUserCode(code); setAssetManagerState(manager); };

      const handleLogout = () => { setUserCode(null); setAssetManagerState(null); };

      const setAssetManager = useCallback(async (updater) => {
        setAssetManagerState(prev => {
          const next = typeof updater === 'function' ? updater(prev) : updater;
          setSyncStatus('syncing');
          db.setManager(userCode, next).then(() => setSyncStatus('ok')).catch(() => setSyncStatus('err'));
          return next;
        });
      }, [userCode]);

      const activeAsset = useMemo(() => {
        if (!assetManager) return null;
        return assetManager.assets.find(a => a.id === assetManager.activeId) || assetManager.assets[0];
      }, [assetManager]);

      const handleAddAsset = async () => {
        if (!newAssetForm.name || !newAssetForm.code) { alert("请填写完整"); return; }
        const newId = Date.now();
        await setAssetManager(prev => ({ assets: [...prev.assets, { ...newAssetForm, id: newId }], activeId: newId }));
        setShowAddModal(false); setNewAssetForm({ name: '', code: '', type: 'fund' });
      };

      const handleDeleteAsset = async (e, id) => {
        e.stopPropagation();
        if (assetManager.assets.length <= 1) { alert("至少保留一个资产"); return; }
        if (!confirm("确定删除该资产及其所有交易记录吗？")) return;
        const newAssets = assetManager.assets.filter(a => a.id !== id);
        await setAssetManager(prev => ({ assets: newAssets, activeId: prev.activeId === id ? newAssets[0].id : prev.activeId }));
      };

      const updateAssetName = (id, newName) => {
        setAssetManager(prev => ({ ...prev, assets: prev.assets.map(a => a.id === id ? { ...a, name: newName } : a) }));
      };

      const [showOverview, setShowOverview] = useState(false);
      const [overviewData, setOverviewData] = useState({});

      const loadOverviewData = async () => {
        setShowOverview(true);
        const result = {};
        for (const asset of assetManager.assets) {
          try {
            const [cfg, rec] = await Promise.all([
              db.getConfig(userCode, asset.id),
              db.getRecords(userCode, asset.id)
            ]);
            result[asset.id] = { config: cfg, records: rec || [], asset };
          } catch(e) { result[asset.id] = { config: null, records: [], asset }; }
        }
        setOverviewData(result);
      };

      if (!userCode) return <LoginPage onLogin={handleLogin} />;
      if (!activeAsset) return <div className="flex items-center justify-center h-screen"><Icon name="RefreshCw" size={24} className="animate-spin" /></div>;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
            <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-2">
                  <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-200">G</div>
                  <h1 className="text-lg font-bold text-slate-800 leading-tight hidden sm:block">网格大师 Pro <span className="text-xs font-normal text-slate-400">v3.2.0 云同步</span></h1>
                </div>

                {/* 资产切换器 */}
                <div className="flex items-center gap-2 ml-4 overflow-x-auto max-w-[200px] sm:max-w-md">
                  {assetManager.assets.map(asset => (
                    <div key={asset.id} onClick={() => setAssetManager(p => ({ ...p, activeId: asset.id }))}
                      className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs cursor-pointer border transition-all whitespace-nowrap group ${asset.id === assetManager.activeId ? 'bg-indigo-50 border-indigo-200 text-indigo-700 font-bold' : 'bg-white border-slate-200 text-slate-600 hover:border-indigo-300'}`}>
                      <Icon name={asset.type === 'stock' ? 'Activity' : 'PieChart'} size={12} />
                      {asset.name}
                      {assetManager.assets.length > 1 && <span onClick={(e) => handleDeleteAsset(e, asset.id)} className="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-red-500 px-1"><Icon name="X" size={12} /></span>}
                    </div>
                  ))}
                  <button onClick={() => setShowAddModal(true)} className="p-1.5 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 transition-colors" title="添加新资产"><Icon name="PlusCircle" size={16} /></button>
                </div>
              </div>

              <div className="flex items-center gap-3">
                {assetManager.assets.length > 1 && (
                  <button onClick={loadOverviewData} className="text-xs text-indigo-600 hover:bg-indigo-50 flex items-center gap-1 px-3 py-1.5 rounded-lg border border-indigo-200 transition-colors font-medium">
                    <Icon name="PieChart" size={14} /> 总览
                  </button>
                )}
                <div className="flex items-center gap-1.5 text-xs text-slate-400">
                  <Icon name="Cloud" size={14} className={syncStatus === 'err' ? 'text-red-400' : syncStatus === 'syncing' ? 'text-amber-400' : 'text-emerald-500'} />
                  <span className="hidden sm:inline">{syncStatus === 'syncing' ? '同步中' : syncStatus === 'err' ? '同步失败' : '云端已同步'}</span>
                </div>
                <button onClick={handleLogout} className="text-xs text-slate-400 hover:text-red-500 flex items-center gap-1 px-2 py-1 rounded hover:bg-red-50 transition-colors">
                  <Icon name="LogOut" size={14} /> 退出
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-8">
            <TradeDashboard key={activeAsset.id} userCode={userCode} assetId={activeAsset.id} assetConfig={activeAsset} onUpdateAssetName={updateAssetName} />
          </main>

          {/* 多资产总览弹窗 */}
          {showOverview && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-start justify-center p-4 overflow-y-auto">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl my-8">
                <div className="p-6 border-b flex justify-between items-center">
                  <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icon name="PieChart" size={20} className="text-indigo-500" /> 多资产收益总览</h2>
                  <button onClick={() => setShowOverview(false)} className="text-slate-400 hover:text-slate-600 p-1"><Icon name="X" size={20} /></button>
                </div>

                <div className="p-6 space-y-6">
                  {/* 汇总卡片 */}
                  {(() => {
                    const allAssets = Object.values(overviewData);
                    if (allAssets.length === 0) return <div className="text-center py-8 text-slate-400"><Icon name="RefreshCw" size={24} className="animate-spin mx-auto" /></div>;

                    let totalPrincipal = 0, totalReturn = 0, totalRealized = 0, totalRecords = 0;
                    allAssets.forEach(({ config, records }) => {
                      if (!config) return;
                      totalPrincipal += config.totalPrincipal || 0;
                      totalRecords += records.length;
                      // 简单估算：用记录里的净卖出
                      const realized = records.filter(r => r.type === 'sell').reduce((s, r) => s + r.amount, 0)
                                     - records.filter(r => r.type === 'buy').reduce((s, r) => s + r.amount, 0);
                      totalRealized += realized;
                    });

                    return (
                      <>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                          <div className="p-4 bg-indigo-50 rounded-xl border border-indigo-100 text-center">
                            <div className="text-xs text-indigo-400 mb-1">总资产数</div>
                            <div className="text-2xl font-bold text-indigo-600">{allAssets.length}</div>
                            <div className="text-xs text-slate-400">个标的</div>
                          </div>
                          <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 text-center">
                            <div className="text-xs text-slate-400 mb-1">总本金</div>
                            <div className="text-2xl font-bold text-slate-700">¥{(totalPrincipal/10000).toFixed(1)}万</div>
                          </div>
                          <div className="p-4 bg-emerald-50 rounded-xl border border-emerald-100 text-center">
                            <div className="text-xs text-emerald-400 mb-1">总交易笔数</div>
                            <div className="text-2xl font-bold text-emerald-600">{totalRecords}</div>
                            <div className="text-xs text-slate-400">笔</div>
                          </div>
                          <div className="p-4 bg-amber-50 rounded-xl border border-amber-100 text-center">
                            <div className="text-xs text-amber-400 mb-1">净卖出金额</div>
                            <div className={`text-2xl font-bold ${totalRealized >= 0 ? 'text-red-500' : 'text-green-600'}`}>
                              {totalRealized >= 0 ? '+' : ''}¥{Math.abs(totalRealized).toLocaleString(undefined,{maximumFractionDigits:0})}
                            </div>
                          </div>
                        </div>

                        {/* 各资产明细 */}
                        <div className="space-y-3">
                          {allAssets.map(({ asset, config, records }) => {
                            if (!config) return null;
                            const buyTotal = records.filter(r => r.type === 'buy').reduce((s, r) => s + r.amount, 0);
                            const sellTotal = records.filter(r => r.type === 'sell').reduce((s, r) => s + r.amount, 0);
                            const netFlow = sellTotal - buyTotal;
                            const buyCount = records.filter(r => r.type === 'buy').length;
                            const sellCount = records.filter(r => r.type === 'sell').length;
                            const lastRecord = [...records].sort((a,b) => new Date(b.date) - new Date(a.date))[0];

                            return (
                              <div key={asset.id} className="border border-slate-200 rounded-xl p-4 hover:border-indigo-200 transition-colors cursor-pointer" onClick={() => { setAssetManager(p => ({...p, activeId: asset.id})); setShowOverview(false); }}>
                                <div className="flex justify-between items-start mb-3">
                                  <div>
                                    <div className="font-bold text-slate-800 flex items-center gap-2">
                                      <span className={`text-xs text-white px-1.5 py-0.5 rounded ${asset.type === 'stock' ? 'bg-blue-500' : 'bg-orange-500'}`}>{asset.type === 'stock' ? '股票' : '基金'}</span>
                                      {asset.name}
                                      <span className="text-xs text-slate-400 font-normal">{config.fundCode}</span>
                                    </div>
                                    <div className="text-xs text-slate-400 mt-1">本金 ¥{config.totalPrincipal.toLocaleString()} · 网格 {config.gridSizePct}%</div>
                                  </div>
                                  <div className="text-right">
                                    <div className={`text-lg font-bold ${netFlow >= 0 ? 'text-red-500' : 'text-green-600'}`}>
                                      {netFlow >= 0 ? '+' : ''}¥{netFlow.toLocaleString(undefined,{maximumFractionDigits:0})}
                                    </div>
                                    <div className="text-xs text-slate-400">净卖出</div>
                                  </div>
                                </div>
                                <div className="grid grid-cols-4 gap-3 text-xs text-center">
                                  <div className="bg-slate-50 p-2 rounded-lg"><div className="text-slate-400">交易笔数</div><div className="font-bold text-slate-700">{records.length}</div></div>
                                  <div className="bg-emerald-50 p-2 rounded-lg"><div className="text-emerald-400">买入 {buyCount}笔</div><div className="font-bold text-emerald-700">¥{(buyTotal/10000).toFixed(1)}万</div></div>
                                  <div className="bg-red-50 p-2 rounded-lg"><div className="text-red-400">卖出 {sellCount}笔</div><div className="font-bold text-red-700">¥{(sellTotal/10000).toFixed(1)}万</div></div>
                                  <div className="bg-slate-50 p-2 rounded-lg"><div className="text-slate-400">最近操作</div><div className="font-bold text-slate-700">{lastRecord ? lastRecord.date.split('T')[0] : '—'}</div></div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </>
                    );
                  })()}
                </div>
              </div>
            </div>
          )}

          {showAddModal && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                <h3 className="text-lg font-bold mb-4">添加新投资标的</h3>
                <div className="space-y-4">
                  <InputGroup label="标的名称" placeholder="例如：招商银行" value={newAssetForm.name} onChange={v => setNewAssetForm({ ...newAssetForm, name: v })} />
                  <InputGroup label="代码" placeholder="例如：600036" value={newAssetForm.code} onChange={v => setNewAssetForm({ ...newAssetForm, code: v })} />
                  <div>
                    <label className="text-sm font-medium text-slate-600 mb-1 block">类型</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button onClick={() => setNewAssetForm({ ...newAssetForm, type: 'fund' })} className={`py-2 text-sm rounded border ${newAssetForm.type === 'fund' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'border-slate-200 text-slate-600'}`}>场外基金</button>
                      <button onClick={() => setNewAssetForm({ ...newAssetForm, type: 'stock' })} className={`py-2 text-sm rounded border ${newAssetForm.type === 'stock' ? 'bg-blue-50 border-blue-500 text-blue-700' : 'border-slate-200 text-slate-600'}`}>A股股票</button>
                    </div>
                  </div>
                  <div className="flex gap-2 mt-6">
                    <Button variant="secondary" className="flex-1" onClick={() => setShowAddModal(false)}>取消</Button>
                    <Button className="flex-1" onClick={handleAddAsset}>创建</Button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GridTraderApp />);
  </script>
</body>
</html>
