    // 轮动评分计算（纯计算，不依赖网络）
    const calcRotationScore = (data, weights) => {
      if (!data || data.length < 26) return null;
      const prices = data.map(d => d.netValue);
      const vols = data.map(d => d.volume || 0);
      const n = prices.length;

      // ── 动量：20日、60日涨幅 ──────────────────────
      const mom20 = n >= 20 ? (prices[n-1] - prices[n-20]) / prices[n-20] * 100 : 0;
      const mom60 = n >= 60 ? (prices[n-1] - prices[n-60]) / prices[n-60] * 100 : 0;
      const momScore = (mom20 * 0.6 + mom60 * 0.4);

      // ── 量能：近5日成交量 vs 近20日均量 ──────────
      const recentVol = vols.slice(-5).reduce((a,b) => a+b, 0) / 5;
      const avgVol20 = vols.slice(-20).reduce((a,b) => a+b, 0) / 20;
      const volRatio = avgVol20 > 0 ? recentVol / avgVol20 : 1;
      const volScore = Math.min((volRatio - 1) * 50, 30);

      // ── ATR 波动率（近14日） ──────────────────────
      let atrSum = 0;
      for (let i = Math.max(1, n-14); i < n; i++) {
        atrSum += Math.abs(prices[i] - prices[i-1]);
      }
      const atr = atrSum / 14;
      const atrPct = prices[n-1] > 0 ? atr / prices[n-1] * 100 : 0;
      const volPenalty = -atrPct * 5;

      // ── 量价共振 ──────────────────────────────────
      const priceUp = prices[n-1] > prices[n-6];
      const volUp = volRatio > 1.1;
      const resonance = priceUp && volUp ? 10 : priceUp && !volUp ? -8 : 0;

      // ── RSI(14) ───────────────────────────────────
      const calcRSI = (p, period = 14) => {
        if (p.length < period + 1) return 50;
        let gains = 0, losses = 0;
        for (let i = p.length - period; i < p.length; i++) {
          const diff = p[i] - p[i-1];
          if (diff > 0) gains += diff; else losses += Math.abs(diff);
        }
        const avgGain = gains / period;
        const avgLoss = losses / period;
        if (avgLoss === 0) return 100;
        const rs = avgGain / avgLoss;
        return parseFloat((100 - 100 / (1 + rs)).toFixed(1));
      };
      const rsi = calcRSI(prices, 14);
      // RSI 信号：50以上趋势偏多，70以上超买扣分，30以下超卖加分（逆向轮动机会）
      const rsiSignal = rsi >= 70 ? 'overbought' : rsi <= 30 ? 'oversold' : rsi >= 50 ? 'bullish' : 'bearish';
      const rsiBonus = rsi >= 50 && rsi < 70 ? 5 : rsi >= 70 ? -5 : rsi <= 30 ? 3 : -3;

      // ── MACD(12,26,9) ─────────────────────────────
      const calcEMA = (p, period) => {
        const k = 2 / (period + 1);
        let ema = p[0];
        for (let i = 1; i < p.length; i++) ema = p[i] * k + ema * (1 - k);
        return ema;
      };
      const calcMACD = (p) => {
        if (p.length < 35) return { macd: 0, signal: 0, hist: 0, trend: 'flat' };
        // 用全部价格计算，避免窗口过短失真
        const ema12 = calcEMA(p, 12);
        const ema26 = calcEMA(p, 26);
        const macdLine = ema12 - ema26;
        // 用近34日计算9日信号线的EMA基础
        const macdSeries = [];
        for (let i = Math.max(26, p.length - 34); i < p.length; i++) {
          const e12 = calcEMA(p.slice(0, i+1), 12);
          const e26 = calcEMA(p.slice(0, i+1), 26);
          macdSeries.push(e12 - e26);
        }
        const signalLine = calcEMA(macdSeries, 9);
        const hist = macdLine - signalLine;
        const prevHist = macdSeries.length >= 2 ? macdSeries[macdSeries.length-2] - calcEMA(macdSeries.slice(0,-1), 9) : 0;
        const trend = hist > 0 && hist > prevHist ? 'golden' : hist > 0 ? 'bullish' : hist < 0 && hist < prevHist ? 'death' : 'bearish';
        return {
          macd: parseFloat(macdLine.toFixed(4)),
          signal: parseFloat(signalLine.toFixed(4)),
          hist: parseFloat(hist.toFixed(4)),
          trend,
        };
      };
      const macdResult = calcMACD(prices);
      // MACD 加减分：金叉/多头加分，死叉/空头扣分
      const macdBonus = macdResult.trend === 'golden' ? 8 : macdResult.trend === 'bullish' ? 4 : macdResult.trend === 'death' ? -8 : -4;

      // ── 估值百分位（价格在历史区间的相对位置）────────
      // 用全量历史数据的最高最低价计算百分位，衡量当前估值高低
      const calcValPct = (p, window = 250) => {
        const slice = p.slice(-window);
        const hi = Math.max(...slice);
        const lo = Math.min(...slice);
        if (hi === lo) return 50;
        return parseFloat(((p[p.length-1] - lo) / (hi - lo) * 100).toFixed(1));
      };
      const valPct1y  = calcValPct(prices, 250);  // 1年（约250交易日）
      const valPct3y  = prices.length >= 750 ? calcValPct(prices, 750) : null;   // 3年
      const valPct5y  = prices.length >= 1250 ? calcValPct(prices, 1250) : null; // 5年
      // 估值信号：低位加分（有更大上涨空间），高位扣分（风险偏高）
      const valLevel  = valPct1y <= 20 ? 'low' : valPct1y <= 40 ? 'below_mid' : valPct1y <= 60 ? 'mid' : valPct1y <= 80 ? 'above_mid' : 'high';
      const valBonus  = valPct1y <= 20 ? 6 : valPct1y <= 40 ? 3 : valPct1y <= 60 ? 0 : valPct1y <= 80 ? -3 : -6;

      // ── 综合得分 ──────────────────────────────────
      const raw = momScore * weights.mom + volScore * weights.vol + volPenalty * weights.atr + resonance + rsiBonus + macdBonus + valBonus;
      const score = Math.max(-100, Math.min(100, raw));

      return {
        score: parseFloat(score.toFixed(1)),
        mom20: parseFloat(mom20.toFixed(2)),
        mom60: parseFloat(mom60.toFixed(2)),
        volRatio: parseFloat(volRatio.toFixed(2)),
        atrPct: parseFloat(atrPct.toFixed(2)),
        resonance,
        rsi,
        rsiSignal,
        macd: macdResult,
        valPct1y,
        valPct3y,
        valPct5y,
        valLevel,
        signal: score >= 15 ? 'strong' : score >= 5 ? 'weak' : score >= -5 ? 'neutral' : score >= -15 ? 'caution' : 'danger',
        lastPrice: prices[n-1],
        priceUp,
        volUp,
      };
    };

    // 轮动回测引擎
    const runRotationBacktest = (allData, weights, holdCount, rebalanceDays, fee) => {
      // 找最短共同起始日
      const allDates = allData.map(d => d.data.map(x => x.date));
      const startDate = allDates.reduce((acc, dates) => {
        const first = dates[0];
        return first > acc ? first : acc;
      }, '2000-01-01');

      // 构建统一日期轴（用第一只ETF作基准）
      const baseData = allData[0].data.filter(d => d.date >= startDate);
      const dates = baseData.map(d => d.date);

      let cash = 100000;
      let holdings = {}; // code -> shares
      let lastRebalance = -rebalanceDays;
      const history = [];
      let buyHoldValue = 100000; // 等权买入持有基准

      // 初始等权买入持有
      const bhInitPrice = {};
      const bhShares = {};
      const bhPerAmount = 100000 / allData.length;
      allData.forEach(etf => {
        const firstDay = etf.data.find(d => d.date >= startDate);
        if (firstDay) { bhInitPrice[etf.code] = firstDay.netValue; bhShares[etf.code] = bhPerAmount / firstDay.netValue; }
      });

      for (let di = 0; di < dates.length; di++) {
        const dateStr = dates[di];

        // 计算当日各ETF价格
        const dayPrices = {};
        allData.forEach(etf => {
          const dayData = etf.data.find(d => d.date === dateStr);
          if (dayData) dayPrices[etf.code] = dayData.netValue;
        });

        // 轮动再平衡
        if (di - lastRebalance >= rebalanceDays && di >= 20) {
          // 计算各ETF当日评分（用截止当日的数据）
          const scores = allData.map(etf => {
            const sliceData = etf.data.filter(d => d.date <= dateStr);
            const sc = calcRotationScore(sliceData, weights);
            return { code: etf.code, name: etf.name, score: sc ? sc.score : -999, price: dayPrices[etf.code] };
          }).filter(x => x.price).sort((a, b) => b.score - a.score);

          const topETFs = scores.slice(0, holdCount);

          // 计算当前持仓市值
          let portfolioValue = cash;
          Object.entries(holdings).forEach(([code, shares]) => {
            if (dayPrices[code]) portfolioValue += shares * dayPrices[code];
          });

          // 卖出不在 Top 的
          Object.entries(holdings).forEach(([code, shares]) => {
            if (!topETFs.find(e => e.code === code) && dayPrices[code]) {
              cash += shares * dayPrices[code] * (1 - fee);
              delete holdings[code];
            }
          });

          // 等权买入 Top ETFs
          const perAmount = cash / topETFs.length;
          topETFs.forEach(etf => {
            if (!holdings[etf.code] && etf.price) {
              const shares = (perAmount * (1 - fee)) / etf.price;
              holdings[etf.code] = (holdings[etf.code] || 0) + shares;
              cash -= perAmount;
            }
          });

          lastRebalance = di;
        }

        // 计算当日组合总值
        let totalValue = cash;
        Object.entries(holdings).forEach(([code, shares]) => {
          if (dayPrices[code]) totalValue += shares * dayPrices[code];
        });

        // 买入持有基准
        let bhTotal = 0;
        allData.forEach(etf => {
          if (dayPrices[etf.code] && bhShares[etf.code]) bhTotal += bhShares[etf.code] * dayPrices[etf.code];
        });

        history.push({
          date: dateStr,
          value: parseFloat(totalValue.toFixed(2)),
          roi: parseFloat(((totalValue - 100000) / 100000 * 100).toFixed(2)),
          bhValue: parseFloat(bhTotal.toFixed(2)),
          bhRoi: parseFloat(((bhTotal - 100000) / 100000 * 100).toFixed(2)),
        });
      }

      const finalValue = history[history.length - 1]?.value || 100000;
      const finalBH = history[history.length - 1]?.bhValue || 100000;
      const maxDD = (() => {
        let peak = 100000, maxD = 0;
        history.forEach(h => { if (h.value > peak) peak = h.value; const d = (peak - h.value) / peak; if (d > maxD) maxD = d; });
        return (maxD * 100).toFixed(2);
      })();

      return { history, finalValue, finalRoi: ((finalValue - 100000) / 100000 * 100).toFixed(2), bhRoi: ((finalBH - 100000) / 100000 * 100).toFixed(2), maxDD };
    };

    // ===== 轮动主面板 =====
    function RotationDashboard({ userCode }) {
      const [activeRotTab, setActiveRotTab] = useState('pool');
      const [pool, setPool] = useState([]);
      const [loadingCodes, setLoadingCodes] = useState({});
      const [etfData, setEtfData] = useState({});
      const [scores, setScores] = useState([]);
      const [weights, setWeights] = useState({ mom: 0.4, vol: 0.35, atr: 0.25 });
      const [holdCount, setHoldCount] = useState(3);
      const [rebalanceDays, setRebalanceDays] = useState(20);
      const [fee, setFee] = useState(0.0003);
      const [backtestResult, setBacktestResult] = useState(null);
      const [isBacktesting, setIsBacktesting] = useState(false);
      const [addCode, setAddCode] = useState('');
      const [addName, setAddName] = useState('');
      const [heatmapPeriod, setHeatmapPeriod] = useState(20);
      const [searchText, setSearchText] = useState('');

      // ── 智能筛选状态 ──────────────────────────────
      const [scanResults, setScanResults] = useState([]);
      const [isScanning, setIsScanning] = useState(false);
      const [scanProgress, setScanProgress] = useState({ done: 0, total: 0, current: '' });
      const [scanFilter, setScanFilter] = useState('weak'); // strong | weak | all
      const [scanSortBy, setScanSortBy] = useState('score'); // score | valPct | rsi | mom20
      const [scanGroup, setScanGroup] = useState('all'); // all | 宽基指数 | 行业主题 | 红利/Smart Beta

      const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine, Area, ComposedChart, Brush } = Recharts;

      // 从 localStorage 加载池子（不依赖 Supabase 额外建表）
      useEffect(() => {
        try {
          const saved = localStorage.getItem(`rotation_pool_${userCode}`);
          if (saved) setPool(JSON.parse(saved));
        } catch(e) {}
      }, [userCode]);

      const savePool = async (newPool) => {
        setPool(newPool);
        // 本地持久化
        try { localStorage.setItem(`rotation_pool_${userCode}`, JSON.stringify(newPool)); } catch(e) {}
        // 同时尝试同步到 Supabase（表存在时生效，不存在时静默失败不报错）
        try {
          const { error } = await supabase.from('rotation_pool')
            .upsert({ user_code: userCode, pool: newPool, updated_at: new Date().toISOString() }, { onConflict: 'user_code' });
          // 只有非404错误才输出（404说明表未建，属于预期情况）
          if (error && !error.message?.includes('relation') && error.code !== '42P01') {
            console.warn('rotation_pool sync:', error.message);
          }
        } catch(e) {}
      };

      const addToPool = (code, name) => {
        if (!code || pool.find(p => p.code === code)) return;
        savePool([...pool, { code: code.trim(), name: name || code }]);
      };

      const removeFromPool = (code) => savePool(pool.filter(p => p.code !== code));

      const [fetchErrors, setFetchErrors] = useState({}); // code -> true 标记失败

      // 拉取单只ETF数据
      const fetchETF = async (code, name) => {
        setLoadingCodes(prev => ({ ...prev, [code]: true }));
        setFetchErrors(prev => { const n = {...prev}; delete n[code]; return n; });
        try {
          const result = await fetchStockRealData(code);
          setEtfData(prev => ({ ...prev, [code]: { name: result.name || name, data: result.data } }));
        } catch(e) {
          setFetchErrors(prev => ({ ...prev, [code]: true }));
        }
        setLoadingCodes(prev => ({ ...prev, [code]: false }));
      };

      // 批量拉取所有池中ETF
      const fetchAll = async () => {
        for (const etf of pool) { await fetchETF(etf.code, etf.name); }
      };

      // ── 智能筛选：扫描预设库所有ETF ─────────────────
      const runScan = async () => {
        // 收集待扫描标的（预设库全量，或按板块过滤）
        let targets = PRESET_ETF_GROUPS.flatMap(g =>
          (scanGroup === 'all' || g.group === scanGroup) ? g.items.map(item => ({ ...item, group: g.group })) : []
        );
        // 去重
        const seen = new Set();
        targets = targets.filter(t => { if (seen.has(t.code)) return false; seen.add(t.code); return true; });

        setScanResults([]);
        setIsScanning(true);
        setScanProgress({ done: 0, total: targets.length, current: '' });

        const results = [];
        for (let i = 0; i < targets.length; i++) {
          const etf = targets[i];
          setScanProgress({ done: i, total: targets.length, current: etf.name });
          try {
            // 优先使用已有数据，避免重复拉取
            let d = etfData[etf.code];
            if (!d) {
              const res = await fetchStockRealData(etf.code);
              d = { name: res.name || etf.name, data: res.data };
              setEtfData(prev => ({ ...prev, [etf.code]: d }));
            }
            const sc = calcRotationScore(d.data, weights);
            if (sc) {
              results.push({ ...etf, name: d.name || etf.name, ...sc });
            }
          } catch(e) {
            // 拉取失败静默跳过
          }
          // 小延迟避免并发过高
          await new Promise(r => setTimeout(r, 80));
        }

        results.sort((a, b) => b.score - a.score);
        setScanResults(results);
        setScanProgress({ done: targets.length, total: targets.length, current: '' });
        setIsScanning(false);
      };

      // 每次数据更新后重算评分
      useEffect(() => {
        const newScores = pool.map(etf => {
          const d = etfData[etf.code];
          if (!d) return { ...etf, score: null, signal: 'nodata' };
          const sc = calcRotationScore(d.data, weights);
          return { ...etf, ...sc };
        }).filter(Boolean).sort((a, b) => (b.score ?? -999) - (a.score ?? -999));
        setScores(newScores);
      }, [etfData, pool, weights]);

      const signalConfig = {
        strong:  { label: '强势', color: 'text-red-600',    bg: 'bg-red-50',    border: 'border-red-200',    dot: 'bg-red-500' },
        weak:    { label: '偏强', color: 'text-orange-500', bg: 'bg-orange-50', border: 'border-orange-200', dot: 'bg-orange-400' },
        neutral: { label: '中性', color: 'text-slate-500',  bg: 'bg-slate-50',  border: 'border-slate-200',  dot: 'bg-slate-400' },
        caution: { label: '偏弱', color: 'text-blue-500',   bg: 'bg-blue-50',   border: 'border-blue-200',   dot: 'bg-blue-400' },
        danger:  { label: '弱势', color: 'text-emerald-600',bg: 'bg-emerald-50',border: 'border-emerald-200',dot: 'bg-emerald-500' },
        nodata:  { label: '无数据',color: 'text-slate-400', bg: 'bg-slate-50',  border: 'border-slate-100',  dot: 'bg-slate-300' },
      };

      // 热力图数据（各ETF最近N日涨跌幅）
      const heatmapData = useMemo(() => {
        return pool.map(etf => {
          const d = etfData[etf.code];
          if (!d || d.data.length < heatmapPeriod + 1) return null;
          const prices = d.data.slice(-heatmapPeriod - 1).map(x => x.netValue);
          const cells = [];
          for (let i = 1; i < prices.length; i++) {
            cells.push(parseFloat(((prices[i] - prices[i-1]) / prices[i-1] * 100).toFixed(2)));
          }
          const total = parseFloat(((prices[prices.length-1] - prices[0]) / prices[0] * 100).toFixed(2));
          return { code: etf.code, name: etfData[etf.code]?.name || etf.name, cells, total };
        }).filter(Boolean);
      }, [pool, etfData, heatmapPeriod]);

      const heatColor = (val) => {
        if (val >= 3) return { bg: '#dc2626', text: 'white' };
        if (val >= 1.5) return { bg: '#f87171', text: 'white' };
        if (val >= 0.5) return { bg: '#fca5a5', text: '#7f1d1d' };
        if (val >= 0) return { bg: '#fee2e2', text: '#991b1b' };
        if (val >= -0.5) return { bg: '#dcfce7', text: '#166534' };
        if (val >= -1.5) return { bg: '#86efac', text: '#14532d' };
        if (val >= -3) return { bg: '#22c55e', text: 'white' };
        return { bg: '#15803d', text: 'white' };
      };

      const doBacktest = () => {
        const readyETFs = pool.map(etf => ({ ...etf, data: etfData[etf.code]?.data || [] })).filter(e => e.data.length >= 60);
        if (readyETFs.length < 2) { alert('请先拉取至少2只ETF的数据（数据量≥60日）'); return; }
        setIsBacktesting(true);
        setTimeout(() => {
          const result = runRotationBacktest(readyETFs, weights, holdCount, rebalanceDays, fee);
          setBacktestResult(result);
          setIsBacktesting(false);
          setActiveRotTab('backtest');
        }, 200);
      };

      const filteredPreset = PRESET_ETF_GROUPS.map(g => ({
        ...g,
        items: g.items.filter(item => !searchText || item.name.includes(searchText) || item.code.includes(searchText))
      })).filter(g => g.items.length > 0);

      // ── 网格适合度评分函数（提到顶层，避免 Hook 规则违反）──
      const calcGridScore = (data) => {
        if (!data || data.length < 60) return null;
        const prices = data.map(d => d.netValue);
        const n = prices.length;
        const slice60 = prices.slice(-60);
        const mean60 = slice60.reduce((a,b) => a+b,0) / 60;
        const std60 = Math.sqrt(slice60.reduce((s,p) => s + Math.pow(p - mean60, 2), 0) / 60);
        const cvPct = mean60 > 0 ? (std60 / mean60 * 100) : 0;
        const oscScore = cvPct < 1 ? 0 : cvPct < 3 ? 40 : cvPct < 8 ? 100 : cvPct < 12 ? 80 : cvPct < 18 ? 50 : 20;
        const ma20 = [];
        for (let i = 19; i < slice60.length; i++) {
          ma20.push(slice60.slice(i-19, i+1).reduce((a,b)=>a+b,0)/20);
        }
        let crossCount = 0;
        for (let i = 1; i < ma20.length; i++) {
          const above = slice60[i+19] > ma20[i];
          const prevAbove = slice60[i+18] > ma20[i-1];
          if (above !== prevAbove) crossCount++;
        }
        const meanRevScore = Math.min(100, crossCount * 12);
        const first20 = prices.slice(-60, -40);
        const last20 = prices.slice(-20);
        const trendPct = mean60 > 0 ? Math.abs((last20.reduce((a,b)=>a+b,0)/20 - first20.reduce((a,b)=>a+b,0)/20) / mean60 * 100) : 0;
        const trendScore = trendPct < 3 ? 100 : trendPct < 8 ? 85 : trendPct < 15 ? 60 : trendPct < 25 ? 30 : 10;
        const hi250 = Math.max(...prices.slice(-250));
        const lo250 = Math.min(...prices.slice(-250));
        const valPct = hi250 > lo250 ? ((prices[n-1] - lo250) / (hi250 - lo250) * 100) : 50;
        const valScore = valPct < 20 ? 100 : valPct < 35 ? 90 : valPct < 50 ? 70 : valPct < 65 ? 45 : valPct < 80 ? 25 : 10;
        const maxP = Math.max(...slice60);
        const minP = Math.min(...slice60);
        const rangeDropPct = maxP > 0 ? ((maxP - minP) / maxP * 100) : 0;
        const rangeScore = rangeDropPct < 3 ? 20 : rangeDropPct < 8 ? 70 : rangeDropPct < 20 ? 100 : rangeDropPct < 30 ? 70 : 30;
        const gridScore = Math.round(oscScore*0.25 + meanRevScore*0.25 + trendScore*0.20 + valScore*0.20 + rangeScore*0.10);
        const suggestGridPct = cvPct < 3 ? 2 : cvPct < 6 ? 3 : cvPct < 10 ? 5 : cvPct < 15 ? 7 : 10;
        const suggestSky = parseFloat((hi250 * 1.05).toFixed(4));
        const suggestGround = parseFloat((lo250 * 0.95).toFixed(4));
        const grade = gridScore >= 80 ? '极适合' : gridScore >= 65 ? '适合' : gridScore >= 50 ? '可以' : gridScore >= 35 ? '一般' : '不适合';
        const gradeColor = gridScore >= 80 ? 'text-emerald-600' : gridScore >= 65 ? 'text-teal-600' : gridScore >= 50 ? 'text-amber-500' : gridScore >= 35 ? 'text-orange-500' : 'text-red-500';
        const gradeBg = gridScore >= 80 ? 'bg-emerald-50 border-emerald-200' : gridScore >= 65 ? 'bg-teal-50 border-teal-200' : gridScore >= 50 ? 'bg-amber-50 border-amber-200' : gridScore >= 35 ? 'bg-orange-50 border-orange-200' : 'bg-red-50 border-red-200';
        return {
          gridScore, grade, gradeColor, gradeBg,
          oscScore: Math.round(oscScore), meanRevScore: Math.round(meanRevScore),
          trendScore: Math.round(trendScore), valScore: Math.round(valScore), rangeScore: Math.round(rangeScore),
          cvPct: parseFloat(cvPct.toFixed(1)), crossCount,
          trendPct: parseFloat(trendPct.toFixed(1)),
          valPct: parseFloat(valPct.toFixed(1)),
          rangeDropPct: parseFloat(rangeDropPct.toFixed(1)),
          suggestGridPct, suggestSky, suggestGround,
          currentPrice: prices[n-1],
        };
      };

      // ── gridCandidates useMemo 提到顶层 ──────────────
      const gridCandidates = useMemo(() => {
        const results = [];
        const allCodes = new Set([...pool.map(e => e.code), ...Object.keys(etfData)]);
        allCodes.forEach(code => {
          const d = etfData[code];
          if (!d || d.data.length < 60) return;
          const rotScore = calcRotationScore(d.data, weights);
          const gs = calcGridScore(d.data);
          if (!gs) return;
          const rotBonus = rotScore ? (
            rotScore.score >= 5 && rotScore.score <= 25 ? 20 :
            rotScore.score > 25 ? 5 :
            rotScore.score >= -10 ? 10 : -10
          ) : 0;
          const finalScore = Math.min(100, Math.max(0, gs.gridScore + rotBonus));
          const etfInfo = pool.find(p => p.code === code) || { code, name: d.name };
          results.push({
            ...etfInfo, name: d.name || etfInfo.name, ...gs, finalScore,
            rotScore: rotScore ? rotScore.score : null,
            rsi: rotScore ? rotScore.rsi : null,
            rsiSignal: rotScore ? rotScore.rsiSignal : null,
            macdTrend: rotScore ? rotScore.macd?.trend : null,
            mom20: rotScore ? rotScore.mom20 : null,
          });
        });
        results.sort((a, b) => b.finalScore - a.finalScore);
        return results;
      }, [etfData, pool, weights]);

      return (
        <div>
          {/* 轮动子导航 */}
          <nav className="flex items-center gap-1 bg-slate-100 p-1 rounded-lg mb-6 flex-wrap">
            {[
              { id: 'pool',      label: 'ETF池管理',  icon: 'Grid' },
              { id: 'signal',    label: '轮动评分',    icon: 'Signal' },
              { id: 'scanner',   label: '智能筛选',    icon: 'Search' },
              { id: 'gridpick',  label: '网格选标',    icon: 'Target' },
              { id: 'heatmap',   label: '量价热力图',  icon: 'Layers' },
              { id: 'backtest',  label: '轮动回测',    icon: 'Calculator' },
            ].map(tab => (
              <button key={tab.id} onClick={() => setActiveRotTab(tab.id)}
                className={`flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium transition-all ${activeRotTab === tab.id ? 'bg-white text-violet-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                <Icon name={tab.icon} size={15} /><span className="hidden sm:inline">{tab.label}</span>
              </button>
            ))}
            <div className="ml-auto flex items-center gap-2">
              <span className="text-xs text-slate-400">{pool.length} 只ETF</span>
              <Button onClick={fetchAll} disabled={pool.length === 0} variant="secondary" className="text-xs py-1 px-2">
                <Icon name="RefreshCw" size={13} /> 全部更新数据
              </Button>
            </div>
          </nav>

          {/* ===== ETF池管理 Tab ===== */}
          {activeRotTab === 'pool' && (
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
              {/* 左：预设池 */}
              <div className="lg:col-span-7 space-y-4">
                <Card className="p-5">
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="font-bold text-slate-800 flex items-center gap-2"><Icon name="Star" size={16} className="text-amber-400" /> 预设 ETF 池</h3>
                    <div className="relative">
                      <Icon name="Search" size={14} className="absolute left-2.5 top-2.5 text-slate-400" />
                      <input value={searchText} onChange={e => setSearchText(e.target.value)} placeholder="搜索名称/代码" className="pl-7 pr-3 py-1.5 text-xs border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-violet-400 w-36" />
                    </div>
                  </div>
                  <div className="space-y-4">
                    {filteredPreset.map(group => (

    // =============================================
    // 主应用（资产管理器）
    // =============================================
    function GridTraderApp() {
      const [userCode, setUserCode] = useState(null);
      const [assetManager, setAssetManagerState] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [newAssetForm, setNewAssetForm] = useState({ name: '', code: '', type: 'fund' });
      const [syncStatus, setSyncStatus] = useState('ok');

      const handleLogin = (code, manager) => { setUserCode(code); setAssetManagerState(manager); };

      const handleLogout = () => { setUserCode(null); setAssetManagerState(null); };

      const setAssetManager = useCallback(async (updater) => {
        setAssetManagerState(prev => {
          const next = typeof updater === 'function' ? updater(prev) : updater;
          setSyncStatus('syncing');
          db.setManager(userCode, next).then(() => setSyncStatus('ok')).catch(() => setSyncStatus('err'));
          return next;
        });
      }, [userCode]);

      const activeAsset = useMemo(() => {
        if (!assetManager) return null;
        return assetManager.assets.find(a => a.id === assetManager.activeId) || assetManager.assets[0];
      }, [assetManager]);

      const handleAddAsset = async () => {
        if (!newAssetForm.name || !newAssetForm.code) { alert("请填写完整"); return; }
        const newId = Date.now();
        await setAssetManager(prev => ({ assets: [...prev.assets, { ...newAssetForm, id: newId }], activeId: newId }));
        setShowAddModal(false); setNewAssetForm({ name: '', code: '', type: 'fund' });
      };

      const handleDeleteAsset = async (e, id) => {
        e.stopPropagation();
        if (assetManager.assets.length <= 1) { alert("至少保留一个资产"); return; }
        const asset = assetManager.assets.find(a => a.id === id);
        if (!asset) return;
        // 软删除：先读取该资产完整数据，存入回收箱，再从列表移除
        try {
          const [cfg, rec] = await Promise.all([
            db.getConfig(userCode, id),
            db.getRecords(userCode, id)
          ]);
          const existingTrash = await db.getTrash(userCode) || [];
          const snapshot = {
            trashId: Date.now(),
            deletedAt: new Date().toISOString(),
            asset,
            config: cfg,
            records: rec || [],
          };
          await db.setTrash(userCode, [snapshot, ...existingTrash].slice(0, 20)); // 最多保留20条
        } catch(e) { console.error('回收箱写入失败', e); }
        const newAssets = assetManager.assets.filter(a => a.id !== id);
        await setAssetManager(prev => ({ assets: newAssets, activeId: prev.activeId === id ? newAssets[0].id : prev.activeId }));
      };

      const updateAssetName = (id, newName) => {
        setAssetManager(prev => ({ ...prev, assets: prev.assets.map(a => a.id === id ? { ...a, name: newName } : a) }));
      };

      const [showOverview, setShowOverview] = useState(false);
      const [overviewData, setOverviewData] = useState({});
      const [showRotation, setShowRotation] = useState(false);
      const [showTrash, setShowTrash] = useState(false);
      const [trashItems, setTrashItems] = useState([]);
      const [trashLoading, setTrashLoading] = useState(false);
      const [restoringId, setRestoringId] = useState(null);

      const openTrash = async () => {
        setShowTrash(true);
        setTrashLoading(true);
        try {
          const items = await db.getTrash(userCode) || [];
          setTrashItems(items);
        } catch(e) { setTrashItems([]); }
        setTrashLoading(false);
      };

      const restoreAsset = async (snapshot) => {
        setRestoringId(snapshot.trashId);
        try {
          // 恢复资产到列表（新 id 避免冲突）
          const newId = Date.now();
          const restoredAsset = { ...snapshot.asset, id: newId };
          await setAssetManager(prev => ({ assets: [...prev.assets, restoredAsset], activeId: prev.activeId }));
          // 恢复 config 和 records
          if (snapshot.config) await db.setConfig(userCode, newId, snapshot.config);
          if (snapshot.records?.length) await db.setRecords(userCode, newId, snapshot.records);
          // 从回收箱移除
          const newTrash = trashItems.filter(t => t.trashId !== snapshot.trashId);
          await db.setTrash(userCode, newTrash);
          setTrashItems(newTrash);
          alert(`「${snapshot.asset.name}」已恢复，含 ${snapshot.records?.length || 0} 笔交易记录`);
        } catch(e) { alert('恢复失败：' + e.message); }
        setRestoringId(null);
      };

      const deleteFromTrash = async (trashId) => {
        const newTrash = trashItems.filter(t => t.trashId !== trashId);

        setTrashItems(newTrash);

      const loadOverviewData = async () => {
        setShowOverview(true);
        const result = {};
        for (const asset of assetManager.assets) {
          try {
            const [cfg, rec] = await Promise.all([
              db.getConfig(userCode, asset.id),
              db.getRecords(userCode, asset.id)
            ]);
            result[asset.id] = { config: cfg, records: rec || [], asset };
          } catch(e) { result[asset.id] = { config: null, records: [], asset }; }
        }
        setOverviewData(result);
      };

      if (!userCode) return <LoginPage onLogin={handleLogin} />;
      if (!activeAsset) return <div className="flex items-center justify-center h-screen"><Icon name="RefreshCw" size={24} className="animate-spin" /></div>;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
          {/* ── 顶部 Header ── */}

            <div className="px-4 h-16 flex items-center justify-between">
              {/* Logo */}
              <div className="flex items-center gap-2 flex-shrink-0">

                  <Icon name="Repeat" size={13} /> <span className="hidden sm:inline">{showRotation ? '退出轮动' : '量能轮动'}</span><span className="sm:hidden">轮动</span>

                      <Icon name="PlusCircle" size={15} />

                  <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icon name="PieChart" size={20} className="text-indigo-500" /> 多资产收益总览</h2>
                  <button onClick={() => setShowOverview(false)} className="text-slate-400 hover:text-slate-600 p-1"><Icon name="X" size={20} /></button>

                  {/* 汇总卡片 */}
                  {(() => {

                    let totalPrincipal = 0, totalReturn = 0, totalRealized = 0, totalRecords = 0;
                    allAssets.forEach(({ config, records }) => {
                      if (!config) return;
                      totalPrincipal += config.totalPrincipal || 0;
                      totalRecords += records.length;
                      // 简单估算：用记录里的净卖出
                      const realized = records.filter(r => r.type === 'sell').reduce((s, r) => s + r.amount, 0)
                                     - records.filter(r => r.type === 'buy').reduce((s, r) => s + r.amount, 0);
                      totalRealized += realized;
                    });

                    return (
                      <>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">

                            <div className="text-xs text-indigo-400 mb-1">总资产数</div>
                            <div className="text-2xl font-bold text-indigo-600">{allAssets.length}</div>
                            <div className="text-xs text-slate-400">个标的</div>
                          </div>
                          <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 text-center">
                            <div className="text-xs text-slate-400 mb-1">总本金</div>
                            <div className="text-2xl font-bold text-slate-700">¥{(totalPrincipal/10000).toFixed(1)}万</div>
                          </div>
                          <div className="p-4 bg-emerald-50 rounded-xl border border-emerald-100 text-center">
                            <div className="text-xs text-emerald-400 mb-1">总交易笔数</div>
                            <div className="text-2xl font-bold text-emerald-600">{totalRecords}</div>
                            <div className="text-xs text-slate-400">笔</div>
                          </div>
                          <div className="p-4 bg-amber-50 rounded-xl border border-amber-100 text-center">
                            <div className="text-xs text-amber-400 mb-1">净卖出金额</div>
                            <div className={`text-2xl font-bold ${totalRealized >= 0 ? 'text-red-500' : 'text-green-600'}`}>
                              {totalRealized >= 0 ? '+' : ''}¥{Math.abs(totalRealized).toLocaleString(undefined,{maximumFractionDigits:0})}
                            </div>
                          </div>
                        </div>

                        {/* 各标的网格点位速查 —— 汇总3档买卖点 */}
                        {(() => {
                          const activeTrades = allAssets.filter(({ records }) => records.length > 0);
                          if (activeTrades.length === 0) return null;
                          return (
                            <div className="border border-slate-200 rounded-xl overflow-hidden">
                              <div className="px-4 py-3 bg-slate-50 border-b border-slate-200 flex items-center gap-2">
                                <Icon name="Target" size={14} className="text-indigo-500" />
                                <span className="font-bold text-slate-700 text-sm">网格点位速查（基于各标的最后一笔成交）</span>
                              </div>
                              <div className="overflow-x-auto">
                                <table className="w-full text-xs">
                                  <thead className="bg-slate-50 border-b border-slate-100">
                                    <tr>
                                      <th className="px-4 py-2.5 text-left text-slate-500 font-medium">标的</th>
                                      <th className="px-3 py-2.5 text-right text-slate-500 font-medium">上次成交</th>
                                      <th className="px-3 py-2.5 text-center text-emerald-600 font-medium bg-emerald-50/50">买-1档</th>
                                      <th className="px-3 py-2.5 text-center text-emerald-600 font-medium bg-emerald-50/50">买-2档</th>
                                      <th className="px-3 py-2.5 text-center text-emerald-600 font-medium bg-emerald-50/50">买-3档</th>
                                      <th className="px-3 py-2.5 text-center text-red-500 font-medium bg-red-50/50">卖+1档</th>
                                      <th className="px-3 py-2.5 text-center text-red-500 font-medium bg-red-50/50">卖+2档</th>
                                      <th className="px-3 py-2.5 text-center text-red-500 font-medium bg-red-50/50">卖+3档</th>
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-slate-100">
                                    {activeTrades.map(({ asset, config, records }) => {
                                      if (!config) return null;
                                      const lastRec = [...records].sort((a,b) => new Date(b.date)-new Date(a.date))[0];
                                      if (!lastRec) return null;
                                      const lp = lastRec.price;
                                      const gp = (config.gridSizePct || 5) / 100;
                                      const minB = config.minBuy || 1000;
                                      const maxB = config.maxBuy || 5000;
                                      const sky = config.skyLine || 99999;
                                      const gnd = config.groundLine || 0;
                                      const totalShares = records.filter(r=>r.type==='buy').reduce((s,r)=>s+r.shares,0) - records.filter(r=>r.type==='sell').reduce((s,r)=>s+r.shares,0);

                                      const buyLevels = [1,2,3].map(i => {
                                        const p = parseFloat((lp * Math.pow(1-gp, i)).toFixed(4));
                                        const ratio = sky > gnd ? Math.max(0, Math.min(1, (sky-p)/(sky-gnd))) : 0.5;
                                        const amt = Math.round(minB + ratio*(maxB-minB));
                                        const shares = p > 0 ? Math.round(amt/p) : 0;
                                        return { p, amt, shares };
                                      });
                                      const sellLevels = [1,2,3].map(i => {
                                        const p = parseFloat((lp * Math.pow(1+gp, i)).toFixed(4));
                                        const shares = Math.max(0, Math.round(totalShares * (i === 1 ? 0.25 : i === 2 ? 0.35 : 0.4)));
                                        const amt = Math.round(shares * p);
                                        return { p, shares, amt };
                                      });

                                      return (
                                        <tr key={asset.id} className="hover:bg-slate-50 cursor-pointer"
                                          onClick={() => { setAssetManager(p => ({...p, activeId: asset.id})); setShowOverview(false); }}>
                                          <td className="px-4 py-3">
                                            <div className="font-medium text-slate-800">{asset.name}</div>
                                            <div className="text-[10px] text-slate-400 font-mono">{config.fundCode} · 网格{config.gridSizePct}%</div>
                                          </td>
                                          <td className="px-3 py-3 text-right">
                                            <div className="font-mono font-bold text-slate-700">{lp.toFixed(4)}</div>
                                            <div className="text-[10px] text-slate-400">{lastRec.type === 'buy' ? '买入' : '卖出'}</div>
                                          </td>
                                          {buyLevels.map((lv, i) => (
                                            <td key={i} className="px-3 py-3 text-center bg-emerald-50/30">
                                              <div className="font-mono font-bold text-emerald-700">{lv.p}</div>
                                              <div className="text-[10px] text-emerald-500">¥{lv.amt.toLocaleString()}</div>
                                              <div className="text-[10px] text-slate-400">{lv.shares}份</div>
                                            </td>
                                          ))}
                                          {sellLevels.map((lv, i) => (
                                            <td key={i} className="px-3 py-3 text-center bg-red-50/30">
                                              <div className="font-mono font-bold text-red-600">{lv.p}</div>
                                              <div className="text-[10px] text-red-400">¥{lv.amt.toLocaleString()}</div>
                                              <div className="text-[10px] text-slate-400">{lv.shares}份</div>
                                            </td>
                                          ))}
                                        </tr>
                                      );
                                    })}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          );
                        })()}

                        {/* 各资产明细 */}
                        <div className="space-y-3">

                            const buyTotal = records.filter(r => r.type === 'buy').reduce((s, r) => s + r.amount, 0);

                            const netFlow = sellTotal - buyTotal;
                            const buyCount = records.filter(r => r.type === 'buy').length;
                            const sellCount = records.filter(r => r.type === 'sell').length;
                            const lastRecord = [...records].sort((a,b) => new Date(b.date) - new Date(a.date))[0];

                            return (
                              <div key={asset.id} className="border border-slate-200 rounded-xl p-4 hover:border-indigo-200 transition-colors cursor-pointer" onClick={() => { setAssetManager(p => ({...p, activeId: asset.id})); setShowOverview(false); }}>
                                <div className="flex justify-between items-start mb-3">
                                  <div>
                                    <div className="font-bold text-slate-800 flex items-center gap-2">
                                      <span className={`text-xs text-white px-1.5 py-0.5 rounded ${asset.type === 'stock' ? 'bg-blue-500' : 'bg-orange-500'}`}>{asset.type === 'stock' ? '股票' : '基金'}</span>
                                      {asset.name}
                                      <span className="text-xs text-slate-400 font-normal">{config.fundCode}</span>
                                    </div>
                                    <div className="text-xs text-slate-400 mt-1">本金 ¥{config.totalPrincipal.toLocaleString()} · 网格 {config.gridSizePct}%</div>
                                  </div>
                                  <div className="text-right">
                                    <div className={`text-lg font-bold ${netFlow >= 0 ? 'text-red-500' : 'text-green-600'}`}>
                                      {netFlow >= 0 ? '+' : ''}¥{netFlow.toLocaleString(undefined,{maximumFractionDigits:0})}
                                    </div>
                                    <div className="text-xs text-slate-400">净卖出</div>
                                  </div>
                                </div>
                                <div className="grid grid-cols-4 gap-3 text-xs text-center">
                                  <div className="bg-slate-50 p-2 rounded-lg"><div className="text-slate-400">交易笔数</div><div className="font-bold text-slate-700">{records.length}</div></div>
                                  <div className="bg-emerald-50 p-2 rounded-lg"><div className="text-emerald-400">买入 {buyCount}笔</div><div className="font-bold text-emerald-700">¥{(buyTotal/10000).toFixed(1)}万</div></div>
                                  <div className="bg-red-50 p-2 rounded-lg"><div className="text-red-400">卖出 {sellCount}笔</div><div className="font-bold text-red-700">¥{(sellTotal/10000).toFixed(1)}万</div></div>
                                  <div className="bg-slate-50 p-2 rounded-lg"><div className="text-slate-400">最近操作</div><div className="font-bold text-slate-700">{lastRecord ? lastRecord.date.split('T')[0] : '—'}</div></div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </>
                    );
                  })()}
                </div>
              </div>
            </div>
          )}

          {/* 回收箱弹窗 */}
          {showTrash && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-start justify-center p-4 overflow-y-auto">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl my-8">
                <div className="p-5 border-b flex justify-between items-center">
                  <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <Icon name="Trash2" size={18} className="text-slate-400" /> 资产回收箱
                    <span className="text-xs font-normal text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{trashItems.length} 条</span>
                  </h2>
                  <button onClick={() => setShowTrash(false)} className="text-slate-400 hover:text-slate-600 p-1"><Icon name="X" size={20} /></button>
                </div>
                <div className="p-5">
                  {trashLoading ? (
                    <div className="text-center py-12 text-slate-400"><Icon name="RefreshCw" size={24} className="animate-spin mx-auto mb-2" />加载中...</div>
                  ) : trashItems.length === 0 ? (
                    <div className="text-center py-16 text-slate-300">
                      <Icon name="Trash2" size={48} className="mx-auto mb-3 opacity-30" />
                      <p className="text-sm">回收箱为空</p>
                      <p className="text-xs mt-1">删除资产时会自动备份到这里，可随时恢复</p>

                    <div className="space-y-3">
                      <p className="text-xs text-slate-400 mb-3">最多保留最近 20 条删除记录，恢复后将以新资产形式加入列表，交易记录完整还原</p>
                      {trashItems.map(snapshot => {
                        const deletedDate = new Date(snapshot.deletedAt);
                        const daysAgo = Math.floor((Date.now() - deletedDate) / (1000 * 60 * 60 * 24));
                        return (
                          <div key={snapshot.trashId} className="border border-slate-200 rounded-xl p-4 hover:border-slate-300 transition-colors">
                            <div className="flex items-start justify-between gap-3">
                              <div className="flex-1 min-w-0">
                                <div className="flex items-center gap-2 mb-1">
                                  <span className={`text-xs text-white px-1.5 py-0.5 rounded flex-shrink-0 ${snapshot.asset?.type === 'stock' ? 'bg-blue-500' : 'bg-orange-500'}`}>
                                    {snapshot.asset?.type === 'stock' ? '股票' : '基金'}
                                  </span>
                                  <span className="font-bold text-slate-800 truncate">{snapshot.asset?.name || '未知资产'}</span>
                                  <span className="text-xs text-slate-400 font-mono flex-shrink-0">{snapshot.asset?.code}</span>
                                </div>
                                <div className="flex items-center gap-4 text-xs text-slate-400 flex-wrap">
                                  <span className="flex items-center gap-1"><Icon name="Calendar" size={11} /> 删除于 {deletedDate.toLocaleDateString('zh-CN')} ({daysAgo === 0 ? '今天' : `${daysAgo}天前`})</span>
                                  <span className="flex items-center gap-1"><Icon name="FileSpreadsheet" size={11} /> {snapshot.records?.length || 0} 笔交易记录</span>
                                  {snapshot.config && <span className="flex items-center gap-1"><Icon name="DollarSign" size={11} /> 本金 ¥{(snapshot.config.totalPrincipal || 0).toLocaleString()}</span>}
                                </div>
                              </div>
                              <div className="flex items-center gap-2 flex-shrink-0">
                                <button
                                  onClick={() => restoreAsset(snapshot)}
                                  disabled={restoringId === snapshot.trashId}
                                  className="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 text-white text-xs rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors font-medium">
                                  {restoringId === snapshot.trashId ? <Icon name="RefreshCw" size={12} className="animate-spin" /> : <Icon name="Undo" size={12} />}
                                  恢复
                                </button>
                                <button
                                  onClick={() => { if (confirm('永久删除这条记录？此操作不可撤销')) deleteFromTrash(snapshot.trashId); }}
                                  className="flex items-center gap-1 px-2 py-1.5 text-xs text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                                  <Icon name="Trash2" size={12} /> 彻底删除
                                </button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {showAddModal && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                <h3 className="text-lg font-bold mb-4">添加新投资标的</h3>
                <div className="space-y-4">
                  <InputGroup label="标的名称" placeholder="例如：招商银行" value={newAssetForm.name} onChange={v => setNewAssetForm({ ...newAssetForm, name: v })} />
                  <InputGroup label="代码" placeholder="例如：600036" value={newAssetForm.code} onChange={v => setNewAssetForm({ ...newAssetForm, code: v })} />
                  <div>
                    <label className="text-sm font-medium text-slate-600 mb-1 block">类型</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button onClick={() => setNewAssetForm({ ...newAssetForm, type: 'fund' })} className={`py-2 text-sm rounded border ${newAssetForm.type === 'fund' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'border-slate-200 text-slate-600'}`}>场外基金</button>
                      <button onClick={() => setNewAssetForm({ ...newAssetForm, type: 'stock' })} className={`py-2 text-sm rounded border ${newAssetForm.type === 'stock' ? 'bg-blue-50 border-blue-500 text-blue-700' : 'border-slate-200 text-slate-600'}`}>A股股票</button>
                    </div>
                  </div>
                  <div className="flex gap-2 mt-6">
                    <Button variant="secondary" className="flex-1" onClick={() => setShowAddModal(false)}>取消</Button>
                    <Button className="flex-1" onClick={handleAddAsset}>创建</Button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GridTraderApp />);
  </script>
</body>
</html>
